<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
  {%- include head.html -%}
</head>
  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

    <div class="no-print">
      {%- include header.html -%}
    </div>
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
      	<form method="get" id="ddgSearch" action="https://duckduckgo.com/">
		<input type="hidden" name="sites" value="https://bigdoodr.github.io"/>
		<input type="hidden" name="k7" value="#4a4a4a"/>
		<input type="hidden" name="k8" value="#ffffff"/>
		<input type="hidden" name="k9" value="#4a90e2"/>
		<input type="hidden" name="kx" value="#4a90e2"/>
		<input type="hidden" name="kj" value="#d2d2d2"/>
		<input type="hidden" name="kt" value="p"/>
		<input type="text" name="q" placeholder="Search…" aria-label="Search https://bigdoodr.github.io on DuckDuckGo"/>
		<button type="submit">Search</button>
		</form>
        {{ content }}
      </div>
    </main>

    <div class="no-print">
      {%- include footer.html -%}
    </div>

    <script>
    // Make the full list-item pill clickable when it contains exactly one link
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll(".page-content li").forEach(function (li) {
        var links = li.querySelectorAll("a");
        if (links.length === 1) {
          li.style.cursor = "pointer";
          li.addEventListener("click", function (e) {
            if (e.target.tagName !== "A") {
              links[0].click();
            }
          });
        }
      });
    });
    </script>
  </body>

</html>
